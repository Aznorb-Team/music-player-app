<div class="page-scroll">
  <div class="page-container">
    <p-card>
      <ng-template #header>
        <div class="section-header section-header--with-filter">
          <div class="section-header__title-group">
            <i class="pi pi-users section-header__icon"></i>
            <span class="section-header__title">Артисты</span>
          </div>
          <p-select
            [options]="genreOptions"
            [ngModel]="selectedGenreId()"
            (ngModelChange)="onGenreChange($event)"
            class="section-header__filter"
            placeholder="Жанр"
            size="small"
            [showClear]="true"
          />
        </div>
      </ng-template>

      @if (artists().length) {
        <div class="catalog-grid">
          @for (artist of artists(); track artist.name) {
            <div
              class="catalog-card catalog-card--interactive"
              [class.catalog-card--selected]="selectedArtistName() === artist.name"
              (click)="selectArtist(artist.name)"
            >
              <div class="catalog-card__image-wrapper">
                <img
                  [src]="artist.coverUrl"
                  [alt]="artist.name"
                  class="catalog-card__image"
                  appImageFallback
                />
              </div>
              <div class="catalog-card__content">
                <h3 class="catalog-card__title">{{ artist.name }}</h3>
                <p class="catalog-card__meta">
                  {{ artist.trackCount }}
                  {{ artist.trackCount === 1 ? 'трек' : 'треков' }}
                </p>
                <div class="catalog-card__actions">
                  <p-button
                    icon="pi pi-play"
                    label="Слушать"
                    size="small"
                    (onClick)="playArtist(artist.name, $event)"
                  />
                  <p-button
                    icon="pi pi-headphones"
                    label="Альбомы"
                    size="small"
                    severity="secondary"
                    [text]="true"
                    (onClick)="openAlbumsForArtist(artist.name, $event)"
                  />
                </div>
              </div>
            </div>
          }
        </div>
      } @else {
        <div class="page-empty">
          <i class="pi pi-search page-empty__icon"></i>
          <p>Артисты по заданным фильтрам не найдены</p>
        </div>
      }
    </p-card>

    <app-track-cards-grid
      [tracks]="selectedArtistTracks()"
      [tagLabel]="selectedArtistName() ?? ''"
      [sectionTitle]="selectedArtistSectionTitle()"
      [queueContext]="queueContext.ARTIST"
    />
  </div>
</div>
