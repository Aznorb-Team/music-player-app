<div
  #track
  class="progress"
  [class.progress--loading]="loading()"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp($event)"
  (pointercancel)="onPointerCancel()"
  (pointerleave)="onPointerLeave($event)"
>
  <canvas
    #waveformBase
    class="progress__waveform progress__waveform--base"
    aria-hidden="true"
  ></canvas>
  <div class="progress__played-clip" [style.width.%]="progress()">
    <canvas
      #waveformPlayed
      class="progress__waveform progress__waveform--played"
      aria-hidden="true"
    ></canvas>
  </div>
  <div class="progress__playhead" [style.left.%]="progress()"></div>
  @if (loading()) {
    <div class="progress__loader" aria-hidden="true">
      <span class="progress__spinner"></span>
    </div>
  }
  @if (previewVisible()) {
    <div class="progress__tooltip" [style.left.%]="previewPercent()">
      {{ previewTime() | time }}
    </div>
  }
</div>
