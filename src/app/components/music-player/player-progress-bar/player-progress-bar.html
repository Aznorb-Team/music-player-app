<div
  class="progress"
  (click)="onTrackClick($event)"
  (mousemove)="onTrackMove($event)"
  (mouseleave)="hidePreview()"
  (mousedown)="onDragStart($event)"
>
  <div class="progress__fill" [style.width.%]="progress()"></div>
  @if (previewVisible()) {
    <div class="progress__tooltip" [style.left.%]="previewPercent()">
      {{ previewTime() | time }}
    </div>
  }
</div>
