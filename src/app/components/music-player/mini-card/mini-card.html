@if (playerService.currentTrack(); as track) {
  <p-card class="mini-card-container">
    <ng-template #header>
      <img
        [alt]="track.title"
        class="mini-card-container__image"
        [src]="track.coverUrl"
        (error)="onImageError($event)"
      />
      @if (track.album) {
        <p-tag
          [value]="track.album"
          severity="warn"
          class="mini-card-container__album-tag"
        />
      }
    </ng-template>
    <ng-template #title>{{ track.title }}</ng-template>
    <ng-template #subtitle>{{ track.artist }}</ng-template>
    <p-fieldset legend="Текст песни">
      <p-scrollpanel [style]="{ width: '100%', height: '150px' }">
        <p class="mini-card-container__lyrics">{{ lyrics }}</p>
      </p-scrollpanel>
    </p-fieldset>
    @if (track.source) {
      <p class="mini-card-container__source">Источник: {{ track.source }}</p>
    }
  </p-card>
}
